<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%2300c8ff' opacity='0.8'/><circle cx='50' cy='50' r='20' fill='%23020408'/></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ophthalmic Digital Twin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --bg: #020408;
        --cyan: #00c8ff;
        --violet: #7c3aed;
        --success: #00ff88;
        --warning: #ff6b35;
        --text: #e2e8f0;
        --text-muted: rgba(226,232,240,0.45);
        --glass-bg: rgba(255,255,255,0.03);
        --glass-border: 1px solid rgba(255,255,255,0.07);
        --font-ui: 'Space Grotesk', sans-serif;
        --font-data: 'Space Mono', monospace;
      }
      html, body, #root {
        width: 100%; height: 100%; overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-ui);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
