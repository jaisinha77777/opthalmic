<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%232563eb'/><circle cx='50' cy='50' r='18' fill='%23ffffff'/></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Glaucoma Clinical Support</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --bg: #f3f5f8;
        --panel: #ffffff;
        --border: #e2e8f0;
        --text: #1f2937;
        --text-muted: #6b7280;
        --accent: #2563eb;
        --accent-soft: #eff4ff;
        --normal: #16a34a;
        --suspect: #ca8a04;
        --mild: #f59e0b;
        --moderate: #ea580c;
        --severe: #dc2626;
        --warn-bg: #fef2f2;
        --warn-border: #fecaca;
        --warn-text: #b91c1c;
        --font: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        --mono: ui-monospace, "SF Mono", "Cascadia Mono", Menlo, monospace;
      }
      html, body, #root { width: 100%; min-height: 100%; }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font);
        font-size: 14px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
